###############################################################################
# .github/workflows/ci.yml
#
# PR / Branch validation — runs on EVERY push to EVERY branch.
# Does NOT build or deploy. Does NOT touch Azure.
#
# Branch logic:
#   feature/*   → unit + integration + dockerfile lint
#   hotfix/*    → same as feature (fast feedback before the hotfix deploy)
#   release/*   → same as feature
#   dependabot/ → unit tests only (no integration needed for dep bumps)
#   main        → all jobs here PLUS deploy.yml fires separately
###############################################################################

name: CI — Tests & Security

on:
  push:
    branches-ignore:
      - main       # main is handled by deploy.yml
  pull_request:
    branches: [main, release/**]

permissions:
  contents: read
  security-events: write    # Required for uploading Trivy SARIF to GitHub Security

jobs:
  ###########################################################################
  # JOB 1 — Unit Tests (all branches)
  ###########################################################################
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
        env:
          NODE_ENV: test

  ###########################################################################
  # JOB 2 — Dockerfile lint (all branches except dependabot)
  # WHY run this early, before build:
  # hadolint catches Dockerfile issues (e.g. "RUN apt-get update && apt-get install"
  # without pinning versions, using ADD instead of COPY, running as root)
  # in ~2 seconds. Catching these before the 3-minute docker build saves time.
  ###########################################################################
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'dependabot/') }}

    steps:
      - uses: actions/checkout@v4

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/api/Dockerfile
          failure-threshold: warning

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/worker/Dockerfile
          failure-threshold: warning

  ###########################################################################
  # JOB 3 — Integration Tests (all branches except dependabot)
  # See CI/CD explanation: ephemeral Docker postgres, not Azure.
  ###########################################################################
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'dependabot/') }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          NODE_ENV: test

      - name: Integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          NODE_ENV: test
          JWT_SECRET: ci-only-not-production

  ###########################################################################
  # JOB 4 — Filesystem Security Scan (all branches except dependabot)
  #
  # WHY scan the filesystem (source code) and not just the image?
  # The image scan (in deploy.yml) runs AFTER docker build. If there's a
  # secret or vulnerable package in the source code, we want to know NOW,
  # on every PR, not only after a build. Two different scans for two different
  # threat surfaces.
  #
  # WHY Trivy and not Snyk/npm audit?
  # Trivy scans: npm packages, OS packages in future image layers, and
  # secrets — all three in one tool with one config. npm audit only covers
  # npm packages. Snyk is paid for teams beyond a certain size.
  ###########################################################################
  scan-source:
    name: Source Security Scan
    runs-on: ubuntu-latest
    needs: unit-test
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'dependabot/') }}

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan source for secrets
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret"
          severity: "CRITICAL,HIGH"
          exit-code: "1"          # Fail the job if secrets are found
          format: "table"

      - name: Trivy — scan dependencies for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln"
          severity: "CRITICAL"    # Only fail on CRITICAL at PR stage
          exit-code: "1"
          format: "sarif"
          output: "trivy-fs.sarif"

      - name: Upload CVE results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-fs.sarif"

  ###########################################################################
  # JOB 5 — Dependabot auto-merge (patch versions only)
  # WHY: Manual review of "bumps axios from 1.6.7 to 1.6.8" is low value.
  # Auto-merge if: unit tests pass AND it's a patch version bump.
  ###########################################################################
  dependabot-auto-merge:
    name: Auto-merge Dependabot patch
    runs-on: ubuntu-latest
    needs: unit-test
    if: >
      github.actor == 'dependabot[bot]' &&
      contains(github.event.pull_request.title, 'patch')
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Merge patch update
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
