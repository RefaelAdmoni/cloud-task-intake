name: Build And Push To ACR

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/build-and-push-acr.yml"
      - "api/**"
      - "worker/**"
      - "frontend/**"
  push:
    branches:
      - main
      - "hotfix/*"
    paths:
      - ".github/workflows/build-and-push-acr.yml"
      - "api/**"
      - "worker/**"
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: build-acr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            working_directory: api
            validation_command: npm run build && npm test
          - component: worker
            working_directory: worker
            validation_command: npm run build
          - component: frontend
            working_directory: frontend
            validation_command: npm run build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.working_directory }}
        run: npm install

      - name: Run validation
        working-directory: ${{ matrix.working_directory }}
        run: ${{ matrix.validation_command }}

  build_and_push:
    name: Build And Push ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: ./api
            dockerfile: ./api/Dockerfile
            image_name: api
          - component: worker
            context: ./worker
            dockerfile: ./worker/Dockerfile
            image_name: worker
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=latest-${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Get ACR access token
        id: acr
        shell: bash
        run: |
          token="$(az acr login --name "${{ vars.ACR_NAME }}" --expose-token --output tsv --query accessToken)"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr.outputs.token }}

      - name: Build and push backend image
        if: matrix.component != 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ steps.tags.outputs.sha_tag }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ steps.tags.outputs.branch_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Build and push frontend image
        if: matrix.component == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ steps.tags.outputs.sha_tag }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ steps.tags.outputs.branch_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
